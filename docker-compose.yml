services:
  # ------------------------------------------------------
  # Backend API (your Node app)
  # ------------------------------------------------------
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: getfit-backend
    ports:
      - "8080:8080"
    environment:
      NODE_ENV: development
      PORT: 8080

      # Dummy local environment (safe)
      OPENAI_API_KEY: "dummy"
      QDRANT_API_KEY: "dummy"
      QDRANT_URL: "http://localhost"   # Not used locally
      MONGO_URI: "mongodb://host.docker.internal:27017/getfit_local"
      REDIS_URL: "redis://redis:6379"
      JWT_SECRET: "local-dev-secret"

      ENABLE_METRICS: "true"
      ENABLE_BACKGROUND_JOBS: "true"

    depends_on:
      - redis
    restart: unless-stopped

  # ------------------------------------------------------
  # Redis (local dev cache)
  # ------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"

  # ------------------------------------------------------
  # Redis Exporter
  # ------------------------------------------------------
  redis-exporter:
    image: oliver006/redis_exporter
    container_name: redis-exporter
    command: ["--redis.addr=redis:6379"]
    ports:
      - "9121:9121"
    depends_on:
      - redis

  # ------------------------------------------------------
  # Node Exporter (host metrics)
  # ------------------------------------------------------
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    pid: "host"
    network_mode: "host"
    restart: unless-stopped
    command:
      - "--path.rootfs=/host"
    volumes:
      - "/:/host:ro,rslave"

  # ------------------------------------------------------
  # Pushgateway
  # ------------------------------------------------------
  pushgateway:
    image: prom/pushgateway
    container_name: pushgateway
    ports:
      - "9091:9091"

  # ------------------------------------------------------
  # CloudWatch Agent (local scraping simulation)
  # ------------------------------------------------------
  cloudwatch-agent:
    image: amazon/cloudwatch-agent:latest
    container_name: cloudwatch-agent
    ports:
      - "9106:9106"

  # ------------------------------------------------------
  # Prometheus
  # ------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - redis
      - redis-exporter
      - node-exporter
      - cloudwatch-agent
      - pushgateway

  # ------------------------------------------------------
  # Grafana
  # ------------------------------------------------------
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/dashboards:/var/lib/grafana/dashboards
      - ./grafana/provisioning:/etc/grafana/provisioning
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_PATHS_PROVISIONING=/etc/grafana/provisioning
    depends_on:
      - prometheus