name: GetFit_AI Backend CD - Staging

# ------------------------------------------------------
# Trigger CD when code changes on main branch
# ------------------------------------------------------
on:
  push:
    branches: [ main ]
    paths:
      - "src/**"
      - "package.json"
      - "package-lock.json"
      - "Dockerfile"
      - ".github/workflows/backend-cd-staging.yml"
      - "infra/ecs/**"
      - "scripts/**"

jobs:

  # ------------------------------------------------------
  # 1) BUILD DOCKER IMAGE + PUSH TO ECR
  # ------------------------------------------------------
  build-and-push:
    runs-on: ubuntu-latest

    # expose output "image" to next job
    outputs:
      image: ${{ steps.build_image.outputs.image }}

    steps:
      # Checkout code
      - name: Checkout
        uses: actions/checkout@v4

      # AWS login
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # ECR login
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Build + Push Backend Image
      - name: Build & Push Docker Image
        id: build_image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: getfit_ai_backend             # repo name in AWS ECR
          IMAGE_TAG: ${{ github.sha }}
        run: |
          echo "Building image $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"

          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

          # create output for next job
          SAFE_IMAGE="$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          echo "image=$SAFE_IMAGE" >> $GITHUB_OUTPUT


  # ------------------------------------------------------
  # 2) UPDATE TASK DEFINITION + DEPLOY TO ECS
  # ------------------------------------------------------
  deploy-staging:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      # repo checkout
      - name: Checkout
        uses: actions/checkout@v4

      # AWS login
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # Render task definition with newly built image
      - name: Render ECS Task Definition
        id: render-taskdef
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: infra/ecs/taskdef.staging.json
          container-name: backend   # MUST MATCH "name" in taskdef JSON
          image: ${{ needs.build-and-push.outputs.image }}

      # Deploy new revision to ECS Service
      - name: Deploy ECS Service
        id: deploy-ecs
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-taskdef.outputs.task-definition }}
          service: ${{ secrets.ECS_SERVICE_STAGING }}
          cluster: ${{ secrets.ECS_CLUSTER_STAGING }}
          wait-for-service-stability: true


  # ------------------------------------------------------
  # 3) RUN POST-DEPLOY SMOKE TESTS
  # ------------------------------------------------------
  post-deploy-e2e:
    needs: deploy-staging
    runs-on: ubuntu-latest

    env:
      STAGING_BASE_URL: ${{ secrets.STAGING_BASE_URL }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL || '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Run E2E Smoke Tests
        id: smoke
        run: |
          chmod +x ./scripts/e2e-smoke.sh
          ./scripts/e2e-smoke.sh

      # Slack Notification (Optional)
      - name: Notify Slack
        if: always() && env.SLACK_WEBHOOK_URL != ''
        run: |
          STATUS="SUCCESS"
          if [ "${{ job.status }}" != "success" ]; then STATUS="FAILED"; fi
          
          payload=$(jq -n \
            --arg status "$STATUS" \
            --arg repo "$GITHUB_REPOSITORY" \
            --arg run "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            '{text: "Backend Deploy: \($status)\nRepository: \($repo)\nRun: \($run)"}')

          curl -X POST -H "Content-Type: application/json" -d "$payload" "$SLACK_WEBHOOK_URL"