name: GetFit_AI Backend CD - Staging

on:
  push:
    branches: [ main ]
    paths:
      - "src/**"
      - "package.json"
      - "package-lock.json"
      - "Dockerfile"
      - ".github/workflows/backend-cd-staging.yml"
      - "infra/ecs/**"
      - "scripts/**"

jobs:

  # ------------------------------------------------------
  # 1) BUILD + PUSH DOCKER IMAGE
  # ------------------------------------------------------
  build_and_push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Check AWS Identity
        run: aws sts get-caller-identity

      - name: Login to ECR (CLI)
        id: login_ecr
        run: |
          REGISTRY="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
          aws ecr get-login-password --region $AWS_REGION \
            | docker login --username AWS --password-stdin $REGISTRY
          echo "REGISTRY=$REGISTRY" >> $GITHUB_ENV
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}

      - name: Build & push Docker image
        id: build_image
        env:
          REGISTRY: ${{ env.REGISTRY }}
          REPOSITORY: getfit_ai_backend
          TAG: ${{ github.sha }}
        run: |
          IMAGE="$REGISTRY/$REPOSITORY:$TAG"
          echo "Building image: $IMAGE"
          docker build -t $IMAGE .
          docker push $IMAGE
          echo "$IMAGE" > image.txt
          echo "Exported image: $IMAGE"

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: built-image
          path: image.txt

  # ------------------------------------------------------
  # 2) DEPLOY TO ECS USING SAVED IMAGE
  # ------------------------------------------------------
  deploy_staging:
    needs: build_and_push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: built-image

      - name: Read image from artifact
        id: read_image
        run: |
          IMAGE=$(cat image.txt)
          echo "image=$IMAGE" >> $GITHUB_OUTPUT
          echo "Using image: $IMAGE"

      - name: Render ECS task definition
        id: render_taskdef
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: infra/ecs/taskdef.staging.json
          container-name: backend
          image: ${{ steps.read_image.outputs.image }}

      - name: Deploy ECS service (staging)
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render_taskdef.outputs.task-definition }}
          cluster: ${{ secrets.ECS_CLUSTER_STAGING }}
          service: ${{ secrets.ECS_SERVICE_STAGING }}
          wait-for-service-stability: true