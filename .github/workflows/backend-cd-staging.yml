name: GetFit_AI Backend CD - Staging

on:
  push:
    branches: [ main ]
    paths:
      - "src/**"
      - "package.json"
      - "package-lock.json"
      - "Dockerfile"
      - ".github/workflows/backend-cd-staging.yml"
      - "infra/ecs/**"
      - "scripts/**"

jobs:
  # ------------------------------------------------------
  # 1) BUILD DOCKER IMAGE + PUSH TO ECR
  # ------------------------------------------------------
  build-and-push:
    runs-on: ubuntu-latest

    outputs:
      image: ${{ steps.export_image.outputs.image }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push Docker image
        id: build-and-push-image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: getfit_ai_backend
          TAG: ${{ github.sha }}
        run: |
          echo "Building image: $REGISTRY/$REPOSITORY:$TAG"

          docker build -t $REGISTRY/$REPOSITORY:$TAG .
          docker push $REGISTRY/$REPOSITORY:$TAG

      - name: Export image output
        id: export_image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: getfit_ai_backend
          TAG: ${{ github.sha }}
        run: |
          IMAGE="$REGISTRY/$REPOSITORY:$TAG"
          echo "image=$IMAGE" >> $GITHUB_OUTPUT
          echo "Exported image: $IMAGE"

  # ------------------------------------------------------
  # 2) UPDATE TASK DEFINITION + DEPLOY TO ECS (STAGING)
  # ------------------------------------------------------
  deploy-staging:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Render ECS task definition
        id: render-taskdef
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          # NOTE: use forward slashes in repo path
          task-definition: infra/ecs/taskdef.staging.json
          container-name: backend
          image: ${{ needs.build-and-push.outputs.image }}

      - name: Deploy ECS service (staging)
        id: deploy-ecs
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-taskdef.outputs.task-definition }}
          cluster: ${{ secrets.ECS_CLUSTER_STAGING }}   # e.g. "getfit-ai-staging-cluster"
          service: ${{ secrets.ECS_SERVICE_STAGING }}   # e.g. "getfit-ai-staging-task-service-k4l73lvg"
          wait-for-service-stability: true