name: GetFit_AI Backend CD - Staging

on:
  push:
    branches: [ main ]
    paths:
      - "src/**"
      - "package.json"
      - "package-lock.json"
      - "Dockerfile"
      - ".github/workflows/backend-cd-staging.yml"
      - "infra/ecs/**"
      - "scripts/**"

jobs: 

  # ------------------------------------------------------
  # 1) BUILD + PUSH DOCKER IMAGES
  # ------------------------------------------------------
  build_and_push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        run: |
          REGISTRY="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com"
          aws ecr get-login-password --region ${{ secrets.AWS_REGION }} \
            | docker login --username AWS --password-stdin $REGISTRY
          echo "REGISTRY=$REGISTRY" >> $GITHUB_ENV

      # -------------------------
      # Build Backend Image
      # -------------------------
      - name: Build & push Backend image
        run: |
          BACKEND_IMAGE="$REGISTRY/getfit_ai_backend:${{ github.sha }}"
          echo "Building $BACKEND_IMAGE"
          docker build -t $BACKEND_IMAGE .
          docker push $BACKEND_IMAGE
          echo "$BACKEND_IMAGE" > backend_image.txt

      # -------------------------
      # Build Diagram Image
      # -------------------------
      - name: Build & push Diagram image
        run: |
          DIAGRAM_IMAGE="$REGISTRY/getfit_ai_diagram:${{ github.sha }}"
          echo "Building $DIAGRAM_IMAGE"
          docker build -t $DIAGRAM_IMAGE ./src/diagram-service
          docker push $DIAGRAM_IMAGE
          echo "$DIAGRAM_IMAGE" > diagram_image.txt

      - name: Upload built image artifacts
        uses: actions/upload-artifact@v4
        with:
          name: built-images
          path: |
            backend_image.txt
            diagram_image.txt

  # ------------------------------------------------------
  # 2) DEPLOY TO ECS USING BUILT IMAGES
  # ------------------------------------------------------
  deploy_staging:
    needs: build_and_push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Download image artifacts
        uses: actions/download-artifact@v4
        with:
          name: built-images

      - name: Read image URIs
        id: read_images
        run: |
          BACKEND_IMAGE=$(cat backend_image.txt)
          DIAGRAM_IMAGE=$(cat diagram_image.txt)
          echo "backend_image=$BACKEND_IMAGE" >> $GITHUB_OUTPUT
          echo "diagram_image=$DIAGRAM_IMAGE" >> $GITHUB_OUTPUT

      # -------------------------
      # Update backend container
      # -------------------------
      - name: Render ECS task definition (backend)
        id: render_backend
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: infra/ecs/taskdef.staging.json
          container-name: backend
          image: ${{ steps.read_images.outputs.backend_image }}

      # -------------------------
      # Update diagram container
      # -------------------------
      - name: Render ECS task definition (diagram)
        id: render_diagram
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ${{ steps.render_backend.outputs.task-definition }}
          container-name: diagram-service
          image: ${{ steps.read_images.outputs.diagram_image }}

      - name: Deploy ECS service (staging)
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render_diagram.outputs.task-definition }}
          cluster: ${{ secrets.ECS_CLUSTER_STAGING }}
          service: ${{ secrets.ECS_SERVICE_STAGING }}
          wait-for-service-stability: true